<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>intelliland · 精品智能体</title>
<meta name="description" content="intelliland 精品智能体，每一个智能体都是精心打造的产品，为真实场景而生，陪你走得更温暖。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div data-site-header data-active="home"></div>
<div data-intelliland-hero></div>

<!-- ============ 场景切换 ============ -->
<section class="scenes" id="scenes">
  <div class="wrap">
    <div class="sec-head reveal" style="margin-bottom:30px">
      <h2 data-typewriter aria-label="让 Agent 走进生活"><img class="sec-star" src="assets/sparkle.png" alt="" aria-hidden="true"><span class="tw-text">让 Agent 走进生活</span><span class="tw-caret" aria-hidden="true"></span></h2>
      <p class="sub">从创作、陪伴到探索，智能体让每个日常更美好</p>
    </div>
    <div class="scene-tabs-wrap reveal" data-d="1">
      <div class="scene-tabs" id="sceneTabs" role="tablist" aria-label="场景切换"></div>
    </div>
    <div class="scene-card reveal" data-d="2" id="sceneCard">
      <div class="sc-text">
        <span class="sc-badge" id="scBadge"></span>
        <h3 id="scTitle"></h3>
        <p id="scDesc"></p>
        <a class="btn btn-dark sc-link" id="scLink" href="#">查看详情 <span class="arr">→</span></a>
      </div>
      <div class="sc-visual">
        <img id="scImg" src="" alt="" decoding="async" />
      </div>
    </div>
  </div>
</section>

<!-- ============ MLA ============ -->
<section id="mla">
  <div class="wrap">
    <div class="mla-band reveal">
      <div class="mla-head">
        <h2>好 Agent 怎么判断<span class="mla-dash">:</span> MLA 标准</h2>
        <p>基于真实体验，我们定义了衡量优质 Agent 的四个维度</p>
      </div>
      <div class="mla-items">
        <div class="mla-item">
          <div class="mla-ic"><img src="assets/mla/01-share.jpg" alt="可分享" loading="lazy"></div>
          <h3>可分享</h3>
          <p>让成果自然传递</p>
        </div>
        <div class="mla-item">
          <div class="mla-ic"><img src="assets/mla/02-collab.jpg" alt="可协作" loading="lazy"></div>
          <h3>可协作</h3>
          <p>支持多人参与</p>
        </div>
        <div class="mla-item">
          <div class="mla-ic"><img src="assets/mla/03-memory.jpg" alt="可回顾" loading="lazy"></div>
          <h3>可回顾</h3>
          <p>记忆持续沉淀</p>
        </div>
        <div class="mla-item">
          <div class="mla-ic"><img src="assets/mla/04-lovable.jpg" alt="可爱" loading="lazy"></div>
          <h3>可爱</h3>
          <p>让人愿意反复使用</p>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ============ 创建 ============ -->
<section class="pad" id="about">
  <div class="wrap">
    <div class="create reveal">
      <div class="ci">
        <div class="spark">✦</div>
        <div>
          <h3>动手创建属于自己的 Agent</h3>
          <p>为你所信赖的场景，分享价值，链接更多用户。</p>
        </div>
      </div>
      <div class="create-stream" aria-hidden="true">
        <div class="cstream-row"><div class="ctrack" id="ctrackA"></div></div>
        <div class="cstream-row"><div class="ctrack rev" id="ctrackB"></div></div>
      </div>
      <a class="btn btn-dark" href="dev.html">开始创建 <span class="arr">→</span></a>
    </div>
  </div>
</section>

<div id="footer"></div>

<script src="components.js"></script>
<script src="data.js"></script>
<script>
/* 场景切换：取 featured 智能体 */
const SCENE_TABS = { bedtime:"睡前陪伴", turtlesoup:"聚会推理", memory:"记忆珍藏", artisan:"知识探索", picturebook:"绘本创作" };
const SCENE_IMGS = { bedtime:"assets/scenes/bedtime.jpg", turtlesoup:"assets/scenes/turtlesoup.jpg", memory:"assets/scenes/memory.jpg", artisan:"assets/scenes/artisan.jpg", picturebook:"assets/scenes/picturebook.jpg" };
const SCENE_ORDER = ["memory","bedtime","turtlesoup","artisan","picturebook"];
const SCENE_ICONS = {
  bedtime:"<path d='M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z'/>",
  turtlesoup:"<path d='M20 11.5a7.5 7.5 0 0 1-10.8 6.7L4 19.5l1.3-4.1A7.5 7.5 0 1 1 20 11.5z'/><path d='M9 10.5h6M9 13.5h4'/>",
  memory:"<path d='M20.5 7.8 12 3 3.5 7.8v8.4L12 21l8.5-4.8z'/><path d='M3.7 8 12 12.7 20.3 8M12 12.7V21'/>",
  artisan:"<path d='M12 6.6C10.4 5.1 7.9 4.6 5 5.1v12.5c2.9-.5 5.4 0 7 1.5 1.6-1.5 4.1-2 7-1.5V5.1c-2.9-.5-5.4 0-7 1.5z'/><path d='M12 6.6V19'/>",
  picturebook:"<path d='M4.5 12a7.5 7.5 0 0 1 12.9-5.2L20 9'/><path d='M20 4.2V9h-4.8'/><path d='M19.5 12a7.5 7.5 0 0 1-12.9 5.2L4 15'/><path d='M4 19.8V15h4.8'/>"
};
const _featured = AGENTS.filter(a => a.featured);
const SCENES = SCENE_ORDER.map(id => _featured.find(a => a.id === id)).filter(Boolean);
const tabsEl = document.getElementById('sceneTabs');
const cardEl = document.getElementById('sceneCard');
const scBadge = document.getElementById('scBadge');
const scTitle = document.getElementById('scTitle');
const scDesc = document.getElementById('scDesc');
const scLink = document.getElementById('scLink');
const scImg = document.getElementById('scImg');
let cur = 0, auto = null;

SCENES.forEach((a, i) => {
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'scene-tab';
  b.setAttribute('role', 'tab');
  b.innerHTML = `<span class="st-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${SCENE_ICONS[a.id]||''}</svg></span><span class="st-tx">${SCENE_TABS[a.id]||a.title}</span>`;
  const go = () => { clearInterval(auto); if (i !== cur) show(i); };
  b.addEventListener('pointerenter', go);  // 鼠标移到 tab 即切换
  b.addEventListener('click', go);          // 兼容点击/触屏
  tabsEl.appendChild(b);
  const pre = new Image(); pre.src = SCENE_IMGS[a.id] || a.img;
});

/* 末尾追加「更多智能体」→ 跳转智能体商店 */
const moreTab = document.createElement('a');
moreTab.href = 'store.html';
moreTab.className = 'scene-tab scene-tab-more';
moreTab.innerHTML = `<span class="st-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><path d="M17.5 14v7M14 17.5h7"/></svg></span><span class="st-tx">更多智能体</span>`;
tabsEl.appendChild(moreTab);

/* 移动端滑动引导：滚到末尾（或无溢出）时隐藏右侧渐隐箭头 */
const stWrap = tabsEl.parentElement;
const updateSwipeHint = () => {
  const atEnd = tabsEl.scrollLeft + tabsEl.clientWidth >= tabsEl.scrollWidth - 8;
  stWrap.classList.toggle('scrolled-end', atEnd);
};
tabsEl.addEventListener('scroll', updateSwipeHint, { passive: true });
window.addEventListener('resize', updateSwipeHint);
updateSwipeHint();

function apply(a){
  scBadge.textContent = a.title;
  scTitle.textContent = a.hero.sub.replace(/[。.]$/, '');
  scDesc.textContent = a.hero.desc;
  scLink.href = `agent.html?id=${a.id}`;
  scImg.src = SCENE_IMGS[a.id] || a.img;
  scImg.alt = a.title;
}
function show(i, instant){
  cur = i;
  [...tabsEl.children].forEach((t, j) => {
    t.classList.toggle('on', j === i);
    t.setAttribute('aria-selected', j === i);
  });
  if (instant){ apply(SCENES[i]); return; }
  cardEl.classList.add('sc-out');
  setTimeout(() => { apply(SCENES[i]); cardEl.classList.remove('sc-out'); }, 240);
}
function restart(){ clearInterval(auto); auto = setInterval(() => show((cur + 1) % SCENES.length), 6000); }
show(0, true);
restart();
/* 指针在 tab 条或卡片上时暂停轮播，离开后恢复 */
[tabsEl, cardEl].forEach(el => {
  el.addEventListener('pointerenter', () => clearInterval(auto));
  el.addEventListener('pointerleave', restart);
});

/* 创建横幅 · 悬浮评论弹幕 */
const REVIEWS = [
  { e:"🌙", t:"我做的睡前故事被收藏了 2.3k 次" },
  { e:"🫶", t:"树洞倾诉陪我熬过了那段低谷" },
  { e:"♟️", t:"海龟汤聚会全场都玩疯了" },
  { e:"🗂️", t:"把外婆的故事都存进了记忆档案馆" },
  { e:"✏️", t:"灵感写作帮我写完了第一本绘本" },
  { e:"⏰", t:"日程管家让我每天准时下班" },
  { e:"🐾", t:"虚拟宠物每天都在等我回家" },
  { e:"🌍", t:"孩子缠着我玩了一下午知识匠人" },
  { e:"✨", t:"上线两周，我的 Agent 有 1.2k 订阅" },
  { e:"📖", t:"AI 绘本工坊产出比我想的更治愈" },
];
const chip = r => `<span class="cchip"><i class="cav">${r.e}</i>${r.t}</span>`;
const half = REVIEWS.map(chip).join('');
const a1 = REVIEWS.slice().reverse().map(chip).join('');
const tA = document.getElementById('ctrackA');
const tB = document.getElementById('ctrackB');
if (tA && tB){ tA.innerHTML = half + half; tB.innerHTML = a1 + a1; }

</script>
<script src="footer.js"></script>
<script src="app.js"></script>
</body>
</html>
