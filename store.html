<body>

<div class="mobile-menu" id="mm">
  <button class="mm-close" onclick="toggleMenu()">×</button>

  <a href="dev.html" onclick="toggleMenu()">创建智能体</a>

</div>

<header id="hdr">
  <div class="wrap">
    <nav>
      <a class="brand" href="index.html">
        <span class="logo"></span>
        <span class="brand-txt"><b>intelliland</b><span>精品智能体</span></span>
      </a>
      <div class="nav-actions">
        <a class="btn btn-dark" href="https://www.wuyong.me/app">立即体验</a>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
      </div>
    </nav>
  </div>
</header>

<!-- ============ 品牌字标 Banner ============ -->
<section class="hero-brand">
  <div class="wrap">
    <a class="store-home-float" href="index.html" aria-label="返回首页">
      <span class="home-float-ic" aria-hidden="true">←</span>
      <span>返回首页</span>
    </a>
    <h1 class="brandmark reveal in" aria-label="Intelliland">
      <img class="bm-mark" src="assets/intelliland-mark.svg" alt="" />
      <span>Intelli</span>
      <span class="bm-avatars" aria-hidden="true">
        <i><img src="assets/avatars/bedtime.jpg" alt="" /></i>
        <i><img src="assets/avatars/turtlesoup.jpg" alt="" /></i>
        <i><img src="assets/avatars/memory.jpg" alt="" /></i>
        <i><img src="assets/avatars/artisan.jpg" alt="" /></i>
        <i><img src="assets/avatars/picturebook.jpg" alt="" /></i>
      </span>
      <span class="bm-type" aria-hidden="true"></span>
      <span>land</span>
    </h1>
  </div>
</section>

<!-- ============ 智能体市场 ============ -->
<section class="scenes store-market" id="market">
  <div class="wrap">
    <div class="sec-head reveal" style="margin-bottom:30px">
      <h2><img class="sec-star" src="assets/sparkle.png" alt="" aria-hidden="true">智能体市场</h2>
      <p class="sub">精选优质 Agent，满足每一个场景与想象。</p>
    </div>
    <div class="cats-wrap reveal" data-d="1">
      <div class="cats" id="cats"></div>
    </div>
    <div class="search store-search reveal" data-d="2">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="text" placeholder="搜索 Agent 名称或关键词" autocomplete="off" />
    </div>
  </div>
</section>

<!-- ============ AGENT GRID ============ -->
<section class="pad" id="featured" style="padding-top:48px">
  <div class="wrap store-list-wrap">
    <div class="row-head reveal">
      <div class="row-copy">
        <h2 id="gridTitle"><img class="row-star" src="assets/sparkle.png" alt="" aria-hidden="true"><span id="gridTitleText">精选推荐</span></h2>
        <p class="row-sub" id="gridSub">编辑精选的优质 Agent，为你带来更好的体验。</p>
      </div>
    </div>
    <div class="grid-agents" id="grid"></div>
    <div id="gridMore" style="text-align:center;margin-top:38px"></div>
  </div>
</section>


<div id="footer"></div>

<script src="data.js"></script>
<script>
const grid = document.getElementById('grid');
const catsEl = document.getElementById('cats');
const qEl = document.getElementById('q');
const gridTitleText = document.getElementById('gridTitleText');
const gridSub = document.getElementById('gridSub');
let activeCat = null;
let expanded = false;

/* 从 URL 读取分类 */
const params = new URLSearchParams(location.search);
if (params.get('cat')) activeCat = params.get('cat');

/* 分类线性图标（与首页场景 tab 统一风格） */
const CAT_ICONS = {
  "陪伴":"<circle cx='9' cy='8.5' r='3'/><path d='M3.5 19.5a5.5 5.5 0 0 1 11 0'/><path d='M16 5.7a3 3 0 0 1 0 5.6M18.5 19.5a5.5 5.5 0 0 0-3-4.9'/>",
  "推理":"<circle cx='11' cy='11' r='6.2'/><path d='m20 20-3.4-3.4'/>",
  "记忆":"<rect x='3' y='7.5' width='18' height='12' rx='1.6'/><path d='M2.5 4.5h19v3h-19z'/><path d='M10 11h4'/>",
  "亲子":"<circle cx='8' cy='7.5' r='2.4'/><path d='M4 20v-2a4 4 0 0 1 8 0v2'/><circle cx='16.5' cy='10.5' r='1.8'/><path d='M13.5 20v-1.4a3 3 0 0 1 6 0V20'/>",
  "宠物":"<circle cx='7' cy='9' r='1.6'/><circle cx='12' cy='7' r='1.6'/><circle cx='17' cy='9' r='1.6'/><path d='M12 12.2c-2.4 0-4.3 1.9-4.3 4 0 1.4 1 2.3 2.3 2.3.9 0 1.4-.5 2-.5s1.1.5 2 .5c1.3 0 2.3-.9 2.3-2.3 0-2.1-1.9-4-4.3-4z'/>",
  "效率":"<circle cx='12' cy='12' r='9'/><path d='M12 7v5l3.5 2'/>",
  "创作":"<path d='M4 20h4L18.4 9.6a2 2 0 0 0-2.8-2.8L5 17.4z'/><path d='M14 8.5l2.8 2.8'/>",
  "治愈":"<path d='M12 20.3s-7-4.6-9.3-9A5 5 0 0 1 12 6a5 5 0 0 1 9.3 5c-2.3 4.4-9.3 9.3-9.3 9.3z'/>"
};
/* 渲染分类 */
CATEGORIES.forEach(c => {
  const el = document.createElement('div');
  el.className = 'cat' + (activeCat === c.name ? ' active' : '');
  el.innerHTML = `<span class="cat-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${CAT_ICONS[c.name]||''}</svg></span><span>${c.name}</span>`;
  el.onclick = () => {
    activeCat = (activeCat === c.name) ? null : c.name;
    qEl.value = '';
    expanded = false;
    syncCats();
    renderGrid();
  };
  el.dataset.name = c.name;
  catsEl.appendChild(el);
});
function syncCats(){
  [...catsEl.children].forEach(el => el.classList.toggle('active', el.dataset.name === activeCat));
}

/* 渲染网格 */
const LIMIT = 4;            // 默认显示一行，查看更多逻辑保持不变
const gridMore = document.getElementById('gridMore');

function renderGrid(){
  const q = qEl.value.trim().toLowerCase();
  let list = AGENTS.slice();
  if (activeCat) list = list.filter(a => a.category === activeCat);
  if (q) list = list.filter(a =>
    (a.title + a.subtitle + a.keywords + a.category).toLowerCase().includes(q));

  /* 标题随筛选变化 */
  if (activeCat){ gridTitleText.textContent = `${activeCat} · 智能体`; gridSub.textContent = `为你筛选「${activeCat}」场景下好用的 Agent。`; }
  else if (q){ gridTitleText.textContent = `搜索结果`; gridSub.textContent = `找到 ${list.length} 个相关 Agent。`; }
  else { gridTitleText.textContent = `精选推荐`; gridSub.textContent = `编辑精选的优质 Agent，为你带来更好的体验。`; }

  grid.innerHTML = '';
  gridMore.innerHTML = '';
  if (!list.length){
    grid.innerHTML = `<div class="empty">没有找到相关的 Agent，换个关键词或场景试试 🌙</div>`;
    return;
  }

  const shown = expanded ? list : list.slice(0, LIMIT);
  shown.forEach((a, i) => {
    const card = document.createElement('a');
    card.href = `agent.html?id=${a.id}`;
    card.dataset.d = (i % 4) + 1;
    const top = a.rank && a.rank <= 3 ? `<span class="rank">TOP ${a.rank}</span>` : '';
    const media = a.img
      ? `<img class="a-bg" src="${a.img}" alt="${a.title}" loading="lazy">`
      : `<div class="a-fallback ${a.scene}"><span>${a.icon}</span></div>`;
    card.className = 'acard reveal';
    card.innerHTML = `
      <div class="a-media">
        ${media}
        ${top}
      </div>
      <div class="a-body">
        <h3>${a.title}</h3>
        <p>${a.subtitle}</p>
        <span class="a-tag">${a.category}</span>
        <span class="more">查看详情</span>
      </div>`;
    grid.appendChild(card);
  });
  if (typeof observeReveals === 'function') observeReveals();

  /* 展开 / 收起 */
  if (list.length > LIMIT){
    const btn = document.createElement('button');
    btn.className = 'btn btn-ghost';
    btn.innerHTML = expanded
      ? '收起 <span class="arr" style="transform:rotate(-90deg)">→</span>'
      : `展开更多 ${list.length - LIMIT} 个 <span class="arr" style="transform:rotate(90deg)">→</span>`;
    btn.onclick = () => { expanded = !expanded; renderGrid(); if (!expanded) document.getElementById('featured').scrollIntoView({behavior:'smooth'}); };
    gridMore.appendChild(btn);
  }
}
function clearFilters(){ activeCat = null; qEl.value=''; expanded = false; syncCats(); renderGrid(); }

qEl.addEventListener('input', () => { expanded = false; renderGrid(); });
renderGrid();

/* 手机端品牌字标打字机：与首页保持一致 */
(function(){
  const el = document.querySelector('.bm-type');
  if (!el) return;
  const WORDS = ['睡前陪伴','聚会推理','记忆珍藏','知识探索','绘本创作'];
  const mq = window.matchMedia('(max-width:560px)');
  let wi = 0, ci = 0, deleting = false, timer = null, running = false;
  function tick(){
    const w = WORDS[wi];
    if (!deleting){
      ci++; el.textContent = w.slice(0, ci);
      if (ci >= w.length){ deleting = true; timer = setTimeout(tick, 1200); return; }
      timer = setTimeout(tick, 140);
    } else {
      ci--; el.textContent = w.slice(0, ci);
      if (ci <= 0){ deleting = false; wi = (wi + 1) % WORDS.length; timer = setTimeout(tick, 320); return; }
      timer = setTimeout(tick, 70);
    }
  }
  function start(){ if (running) return; running = true; wi = 0; ci = 0; deleting = false; tick(); }
  function stop(){ running = false; clearTimeout(timer); timer = null; el.textContent = ''; }
  function apply(){ mq.matches ? start() : stop(); }
  mq.addEventListener ? mq.addEventListener('change', apply) : mq.addListener(apply);
  apply();
})();
</script>
<script src="footer.js"></script>
<script src="app.js"></script>
</body>
</html>
