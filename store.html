<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>智能体商店 · intelliland</title>
<meta name="description" content="精选优质 Agent，满足每一个场景与想象。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="mobile-menu" id="mm">
  <button class="mm-close" onclick="toggleMenu()">×</button>
  <a href="index.html" onclick="toggleMenu()">首页</a>
  <a href="store.html" onclick="toggleMenu()">智能体商店</a>
  <a href="dev.html" onclick="toggleMenu()">创建智能体</a>
  <a href="https://www.wuyong.me/app" style="color:var(--accent)">立即体验 →</a>
</div>

<header id="hdr">
  <div class="wrap">
    <nav>
      <a class="brand" href="index.html">
        <span class="logo"></span>
        <span class="brand-txt"><b>intelliland</b><span>精品智能体</span></span>
      </a>
      <div class="navlinks">
        <a href="index.html">首页</a>
        <a href="store.html" class="active">智能体商店</a>
        <a href="dev.html">创建智能体</a>
      </div>
      <div class="nav-actions">
        <a class="btn btn-dark" href="https://www.wuyong.me/app">立即体验</a>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
      </div>
    </nav>
  </div>
</header>

<!-- ============ STORE HERO ============ -->
<section class="store-hero">
  <div class="wrap">
    <div class="store-orb"></div>
    <h1 class="reveal in">智能体商店</h1>
    <p class="reveal in" data-d="1">精选优质 Agent，满足每一个场景与想象。</p>
    <div class="search reveal in" data-d="2">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="text" placeholder="搜索 Agent 名称或关键词" autocomplete="off" />
    </div>
  </div>
</section>

<!-- ============ CATEGORIES ============ -->
<section style="padding:40px 0 16px">
  <div class="wrap">
    <div class="cats" id="cats"></div>
  </div>
</section>

<!-- ============ AGENT GRID ============ -->
<section class="pad" id="featured" style="padding-top:48px">
  <div class="wrap">
    <div class="row-head reveal">
      <div>
        <h2 id="gridTitle">精选推荐</h2>
        <p class="row-sub" id="gridSub">编辑精选的优质 Agent，为你带来更好的体验。</p>
      </div>
    </div>
    <div class="grid-agents" id="grid"></div>
    <div id="gridMore" style="text-align:center;margin-top:38px"></div>
  </div>
</section>


<!-- ============ BIG CTA ============ -->
<section style="padding:64px 0 96px">
  <div class="wrap">
    <div class="bigcta reveal">
      <div class="glow"></div>
      <h2>一起体验值得留下来的智能体</h2>
      <p>从学习，到生活，让它们陪你走得更温暖。</p>
      <a class="btn btn-dark" href="https://www.wuyong.me/app">立即体验 <span class="arr">→</span></a>
    </div>
  </div>
</section>

<div id="footer"></div>

<script src="data.js"></script>
<script>
const grid = document.getElementById('grid');
const catsEl = document.getElementById('cats');
const qEl = document.getElementById('q');
const gridTitle = document.getElementById('gridTitle');
const gridSub = document.getElementById('gridSub');
let activeCat = null;
let expanded = false;

/* 从 URL 读取分类 */
const params = new URLSearchParams(location.search);
if (params.get('cat')) activeCat = params.get('cat');

/* 渲染分类 */
CATEGORIES.forEach(c => {
  const el = document.createElement('div');
  el.className = 'cat' + (activeCat === c.name ? ' active' : '');
  el.innerHTML = `<div class="emo"><img src="${c.img}" alt="${c.name}" loading="lazy"></div><span>${c.name}</span>`;
  el.onclick = () => {
    activeCat = (activeCat === c.name) ? null : c.name;
    qEl.value = '';
    expanded = false;
    syncCats();
    renderGrid();
  };
  el.dataset.name = c.name;
  catsEl.appendChild(el);
});
function syncCats(){
  [...catsEl.children].forEach(el => el.classList.toggle('active', el.dataset.name === activeCat));
}

/* 渲染网格 */
const LIMIT = 8;            // 默认显示两行（4 列 × 2）
const gridMore = document.getElementById('gridMore');

function renderGrid(){
  const q = qEl.value.trim().toLowerCase();
  let list = AGENTS.slice();
  if (activeCat) list = list.filter(a => a.category === activeCat);
  if (q) list = list.filter(a =>
    (a.title + a.subtitle + a.keywords + a.category).toLowerCase().includes(q));

  /* 标题随筛选变化 */
  if (activeCat){ gridTitle.textContent = `${activeCat} · 智能体`; gridSub.textContent = `为你筛选「${activeCat}」场景下好用的 Agent。`; }
  else if (q){ gridTitle.textContent = `搜索结果`; gridSub.textContent = `找到 ${list.length} 个相关 Agent。`; }
  else { gridTitle.textContent = `精选推荐`; gridSub.textContent = `编辑精选的优质 Agent，为你带来更好的体验。`; }

  grid.innerHTML = '';
  gridMore.innerHTML = '';
  if (!list.length){
    grid.innerHTML = `<div class="empty">没有找到相关的 Agent，换个关键词或场景试试 🌙</div>`;
    return;
  }

  const shown = expanded ? list : list.slice(0, LIMIT);
  shown.forEach((a, i) => {
    const card = document.createElement('a');
    card.href = `agent.html?id=${a.id}`;
    card.dataset.d = (i % 4) + 1;
    const top = a.rank ? `<span class="rank">TOP ${a.rank}</span>` : '';
    if (a.img) {
      card.className = 'acard has-img reveal';
      card.innerHTML = `
        <img class="a-bg" src="${a.img}" alt="${a.title}" loading="lazy">
        ${top}
        <span class="a-ico">${a.icon}</span>
        <h3>${a.title}</h3>
        <p>${a.subtitle}</p>
        <span class="more">查看详情 →</span>`;
    } else {
      card.className = 'acard ' + a.scene + ' reveal';
      card.innerHTML = `
        ${top}
        <span class="a-ico">${a.icon}</span>
        ${a.moon ? '<div class="orb-sm"></div>' : ''}
        ${a.stars ? '<div class="deco-stars"></div>' : ''}
        <h3>${a.title}</h3>
        <p>${a.subtitle}</p>
        <span class="more">查看详情 →</span>`;
    }
    grid.appendChild(card);
  });
  if (typeof observeReveals === 'function') observeReveals();

  /* 展开 / 收起 */
  if (list.length > LIMIT){
    const btn = document.createElement('button');
    btn.className = 'btn btn-ghost';
    btn.innerHTML = expanded
      ? '收起 <span class="arr" style="transform:rotate(-90deg)">→</span>'
      : `展开更多 ${list.length - LIMIT} 个 <span class="arr" style="transform:rotate(90deg)">→</span>`;
    btn.onclick = () => { expanded = !expanded; renderGrid(); if (!expanded) document.getElementById('featured').scrollIntoView({behavior:'smooth'}); };
    gridMore.appendChild(btn);
  }
}
function clearFilters(){ activeCat = null; qEl.value=''; expanded = false; syncCats(); renderGrid(); }

qEl.addEventListener('input', () => { expanded = false; renderGrid(); });
renderGrid();
</script>
<script src="footer.js"></script>
<script src="app.js"></script>
</body>
</html>
